name: Build macOS DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        run: |
          swift build -c release

      - name: Create App Bundle
        run: |
          APP_NAME="InputRedirectMac"

          mkdir -p "$APP_NAME.app/Contents/MacOS"
          mkdir -p "$APP_NAME.app/Contents/Resources"

          cp ".build/release/$APP_NAME" \
             "$APP_NAME.app/Contents/MacOS/$APP_NAME"

          chmod +x \
             "$APP_NAME.app/Contents/MacOS/$APP_NAME"

          cp Assets/icon.icns \
             "$APP_NAME.app/Contents/Resources/icon.icns"

          cat > "$APP_NAME.app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$APP_NAME</string>

              <key>CFBundleIdentifier</key>
              <string>com.inputredirect.mac</string>

              <key>CFBundleName</key>
              <string>$APP_NAME</string>

              <key>CFBundleDisplayName</key>
              <string>$APP_NAME</string>

              <key>CFBundlePackageType</key>
              <string>APPL</string>

              <key>CFBundleVersion</key>
              <string>1.0</string>

              <key>CFBundleShortVersionString</key>
              <string>1.0</string>

              <key>CFBundleIconFile</key>
              <string>icon</string>

              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "InputRedirectMac" \
            -srcfolder InputRedirectMac.app \
            -ov \
            -format UDZO \
            InputRedirectMac.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: InputRedirectMac-DMG
          path: InputRedirectMac.dmg
