name: Build macOS App

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Swift App
        run: |
          swift build -c release

      - name: Create App Bundle
        run: |
          mkdir -p InputRedirectMac.app/Contents/MacOS
          mkdir -p InputRedirectMac.app/Contents/Resources

          cp .build/release/InputRedirectMac InputRedirectMac.app/Contents/MacOS/

          cp icon.icns InputRedirectMac.app/Contents/Resources/

          cat > InputRedirectMac.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>InputRedirectMac</string>

              <key>CFBundleIdentifier</key>
              <string>com.yourname.inputredirectmac</string>

              <key>CFBundleName</key>
              <string>InputRedirectMac</string>

              <key>CFBundlePackageType</key>
              <string>APPL</string>

              <key>CFBundleVersion</key>
              <string>1.0</string>

              <key>CFBundleShortVersionString</key>
              <string>1.0</string>

              <key>CFBundleIconFile</key>
              <string>icon</string>

              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          EOF

          chmod +x InputRedirectMac.app/Contents/MacOS/InputRedirectMac

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "InputRedirectMac" \
            -srcfolder InputRedirectMac.app \
            -ov \
            -format UDZO \
            InputRedirectMac.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: InputRedirectMac
          path: InputRedirectMac.dmg
